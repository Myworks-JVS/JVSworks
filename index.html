<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz App</title>

<link rel="stylesheet" href="quiz-style.css">

<script src="lib/xlsx.full.min.js"></script>
<script src="quiz.js" defer></script>
<script src="timer.js" defer></script>

<style>
.hidden { display: none; }

</style>
</head>

<body>

<!-- Banner -->
<div class="banner-container">
    <img src="images/banner.png" alt="Quiz Banner" class="banner-image">
</div>

<!-- ================= LOGIN SECTION ================= -->
<div id="login-container">
    <h1>Login to Start the MCQ exam</h1>

    <input type="text" id="username" placeholder="Enter Username" required>

    <button id="loginButton" class="btn login-btn">Login</button>

    <p id="error-message" style="color:red; display:none;">
        Please enter a username
    </p>
</div>

<!-- ================= QUIZ SECTION ================= -->
<div id="quiz-container" class="quiz-page hidden">
    
    <div style="display:flex; align-items:center; gap:20px;">
        <div id="timer" style="font-size:1rem; color:orange;">00:00:00</div>
        <h1 class="warning-text">
            Welcome to Quixls, Excel to Exam
            </h1>
    </div>
    
    <p id="user-info"></p>
    
    <!-- ===== FILE UPLOAD SECTION ===== -->
    <div class="file-section">
        
        <input type="file"
        id="fileUpload"
        accept=".xlsx"
        onchange="loadExcelFile(event)"
        class="file-upload-input" />
        <label id="fileLabel" class="file-label">
            Select valid Excel file to start
        </label>

        <button id="startQuizBtn" class="btn start-btn" disabled onclick="beginQuiz()">
            Start
        </button>
        
        <!-- ===== TEMPLATE PREVIEW ===== -->
        <div id="templatePreview"class="template-preview-container">
            <h3>Template Preview</h3>
            <div class="template-preview-frame">
                <img src="images/excel_template_preview.png"
                    alt="Template Preview"
                    class="template-preview-image">
            </div>
        </div>
        
        <a id="downloadTemplateBtn"
            class="btn template-btn"
            href="https://github.com/sugunakar85/Quixls/releases/download/v1.1/Progressive_MCQ_Template.xlsx"
            download>
            Download Template
        </a>
        
    </div>
    <!-- ===== PROGRESS BAR (NEW) ===== -->
    <div id="progress-wrapper">
        <div id="progress-bar"></div>
    </div>
    <p id="question-progress" style="font-weight:600; margin-top:8px;"></p>
    <!-- ===== QUESTION AREA ===== -->
    <p id="question-progress" style="font-weight:600; margin-top:10px;"></p>
    <div id="mcq-question-container" class="question-container" style="display:none;">
        <h3 id="question-title" class="question-title"></h3>
        <div id="question-options" class="options-container"></div>
    </div>
    
    <!-- ===== NAV BUTTONS ===== -->
    <div class="button-group">
        <!--  Disabled by default (IMPORTANT CHANGE) -->
        <button
            id="previousButton"
            class="btn previous-btn"
            style="display:none;"
            onclick="previousQuestion()">
            Previous
        </button>
        <button id="nextButton" class="btn" style="display:none;" disabled onclick="nextQuestion()">Next</button>
        
        <!-- Disabled by default -->
        <button id="submitButton" class="btn" style="display:none;" disabled onclick="submitQuiz()">Submit</button>
    </div>
    
    <!-- ===== RESULTS ===== -->
    <div id="results-container" class="results-container" style="display:none;">
        <h3>Your Results</h3>
        <div id="results"></div>
        
        <div class="button-group">
            <button id="saveButton" class="btn" onclick="saveResults()">Download Key</button>
            
            <!-- NEW BUTTON -->
            <button id="downloadScoreBtn" class="btn download-btn" onclick="downloadUserScore()">
                Download Score
            </button>
        </div>
    </div>
</div>
<footer>
<p style="font-size:0.8em; color:#777;">
© 2026 <strong>JVS Edtek</strong>. All rights reserved.
</p>
</footer>

<!-- ================= SCRIPT ================= -->

</body>
</html>
